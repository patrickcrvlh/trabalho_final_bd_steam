<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Estatísticas</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4 mb-5">

    <h2 class="mb-4">

        Estatísticas da Base Steam

    </h2>

    <div class="row mb-4">

        <div class="col-md-3">

            <div class="card text-center shadow">

                <div class="card-body">

                    <h1 th:text="${totalJogos}"></h1>

                    <p class="text-muted mb-0">
                        Jogos
                    </p>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-center shadow">

                <div class="card-body">

                    <h1 th:text="${totalGeneros}"></h1>

                    <p class="text-muted mb-0">
                        Gêneros
                    </p>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-center shadow">

                <div class="card-body">

                    <h1 th:text="${totalIdiomas}"></h1>

                    <p class="text-muted mb-0">
                        Idiomas
                    </p>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-center shadow">

                <div class="card-body">

                    <h1 th:text="${totalTags}"></h1>

                    <p class="text-muted mb-0">
                        Tags
                    </p>

                </div>

            </div>

        </div>

    </div>

    <div class="row">

        <div class="col-lg-6">

            <div class="card shadow mb-4">

                <div class="card-body">

                    <h4>Distribuição de Jogos por Gênero</h4>

                    <canvas id="graficoGeneros" height="300"></canvas>

                </div>

            </div>

        </div>

        <div class="col-lg-6">

            <div class="card shadow mb-4">

                <div class="card-body">

                    <h4>Compatibilidade por Plataforma</h4>

                    <canvas id="graficoPlataformas" height="300"></canvas>

                </div>

            </div>

        </div>

        <div class="col-lg-6">

            <div class="card shadow">

                <div class="card-body">

                    <h4>Top 10 Idiomas Suportados</h4>

                    <canvas id="graficoIdiomas" height="300"></canvas>

                </div>

            </div>

        </div>

        <div class="col-lg-6">

            <div class="card shadow">

                <div class="card-body">

                    <h4>Top 10 Tags Mais Utilizadas</h4>

                    <canvas id="graficoTags" height="300"></canvas>

                </div>

            </div>

        </div>

    </div>

</div>

<script th:inline="javascript">

    /* ===========================
       GÊNEROS
       =========================== */

    const generos = /*[[${generos}]]*/ [];

    const nomesGeneros = generos.map(g => g.nome);
    const qtdGeneros = generos.map(g => g.quantidade);

    new Chart(document.getElementById("graficoGeneros"), {

        type: "pie",

        data: {

            labels: nomesGeneros,

            datasets: [{

                data: qtdGeneros,

                borderWidth: 2

            }]

        }

    });

    /* ===========================
       IDIOMAS
       =========================== */

    const idiomas = /*[[${idiomas}]]*/ [];

    const nomesIdiomas = idiomas.map(i => i.nome);
    const qtdIdiomas = idiomas.map(i => i.quantidade);

    new Chart(document.getElementById("graficoIdiomas"), {

        type: "bar",

        data: {

            labels: nomesIdiomas,

            datasets: [{

                data: qtdIdiomas

            }]

        },

        options: {

            indexAxis: 'y',

            responsive: true,

            plugins: {

                legend: {

                    display: false

                }

            },

            scales: {
                x: {
                    grid: {
                        display: false
                    }
                },
                y: {
                    grid: {
                        display: false
                    }
                }
            }

        }

    });

    /* ===========================
       TAGS
       =========================== */

    const tags = /*[[${tags}]]*/ [];

    const nomesTags = tags.map(t => t.nome);
    const qtdTags = tags.map(t => t.quantidade);

    new Chart(document.getElementById("graficoTags"), {

        type: "bar",

        data: {

            labels: nomesTags,

            datasets: [{

                label: "Quantidade",

                data: qtdTags

            }]

        },

        options: {

            indexAxis: 'y',

            responsive: true,

            plugins: {

                legend: {

                    display: false

                }

            },

            scales: {
                x: {
                    grid: {
                        display: false
                    }
                },
                y: {
                    grid: {
                        display: false
                    }
                }
            }

        }

    });

    /* ===========================
       PLATAFORMAS
       =========================== */

    const plataformas = /*[[${plataformas}]]*/ [];

    const nomesPlataformas = plataformas.map(p => p.nome);
    const qtdPlataformas = plataformas.map(p => p.quantidade);

    new Chart(document.getElementById("graficoPlataformas"), {

        type: "doughnut",

        data: {

            labels: nomesPlataformas,

            datasets: [{

                data: qtdPlataformas,

                borderWidth: 2

            }]

        }

    });

</script>

</body>

</html>
