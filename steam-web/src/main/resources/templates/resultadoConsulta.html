<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title th:text="${titulo}"></title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.datatables.net/2.3.2/css/dataTables.dataTables.min.css">

</head>

<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-5">

    <h2 th:text="${titulo}"></h2>

    <p class="text-muted"
       th:text="${descricao}">
    </p>

    <table id="tabelaConsulta"
           class="table table-striped table-hover">

        <thead>

        <tr>

            <th th:each="coluna : ${colunas}"
                th:text="${coluna}">
            </th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="linha : ${linhas}">

            <td th:each="valor : ${linha.valores}"
                th:text="${valor}">
            </td>

        </tr>

        </tbody>

    </table>

    <a href="/consultas"
       class="btn btn-secondary">
        ← Voltar para Consultas
    </a>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.datatables.net/2.3.2/js/dataTables.js"></script>

<script>

    document.addEventListener("DOMContentLoaded", function () {

        new DataTable('#tabelaConsulta', {

            pageLength: 10,

            lengthMenu: [1, 5, 10],

            language: {

                url: "https://cdn.datatables.net/plug-ins/2.3.2/i18n/pt-BR.json"

            }

        });

    });

</script>

</body>

</html>
