<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Steam Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div th:replace="fragments/navbar :: navbar"></div>

    <div class="container-fluid">

        <span class="navbar-brand mb-0 h1">

            Steam Dashboard

        </span>

    </div>

</nav>

<div class="container mt-4">

    <div class="row">

        <div class="col-md-3 mb-3">

            <div class="card shadow">

                <div class="card-body">

                    <h6 class="text-muted">

                        Jogos cadastrados

                    </h6>

                    <h2 th:text="${totalJogos}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-3 mb-3">

            <div class="card shadow">

                <div class="card-body">

                    <h6 class="text-muted">

                        Idiomas

                    </h6>

                    <h2 th:text="${totalIdiomas}"></h2>

                </div>

            </div>

        </div>

        <div class="col-md-3 mb-3">

            <div class="card shadow">

                <div class="card-body">

                    <h6 class="text-muted">

                        Gêneros

                    </h6>

                    <h2 th:text="${totalGeneros}"></h2>

                </div>

            </div>

        </div>

        </div>

    <div class="col-md-3 mb-3">

        <div class="card shadow">

            <div class="card-body">

                <h6 class="text-muted">

                    Tags

                </h6>

                <h2 th:text="${totalTags}"></h2>

            </div>

        </div>

    </div>

    </div>

    <hr>

    <div class="row mb-4">

        <div class="col-md-8">

            <form action="/buscar" method="get">

                <div class="input-group">

                    <input
                            type="text"
                            class="form-control"
                            placeholder="Digite o nome de um jogo..."
                            name="nome">

                    <button
                            class="btn btn-success"
                            type="submit">

                        Pesquisar

                    </button>

                </div>

            </form>

        </div>

    </div>

<div class="card shadow mt-4">

    <div class="card-body text-center">

        <h3>

            Consultas SQL

        </h3>

        <p>

            Visualize todas as consultas desenvolvidas para o banco de dados Steam.

        </p>

        <a href="/consultas"
           class="btn btn-primary">
            Abrir Consultas
        </a>

    </div>

</div>

</div>

</body>
</html>
